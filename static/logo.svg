<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120">
  <defs>
    <style>
      .bg { fill: #0F172A; }
      .text-main { fill: #FFFFFF; font-family: 'Segoe UI', sans-serif; font-weight: 800; }
      .text-accent { fill: #22d3ee; font-family: 'Segoe UI', sans-serif; font-weight: 300; }
    </style>
  </defs>
  <rect width="500" height="120" class="bg" rx="10"/>
  <g transform="translate(60, 60)">
    <!-- Scope / Lens Ring -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <!-- Crosshairs -->
    <path d="M-45,0 L-15,0 M15,0 L45,0 M0,-45 L0,-15 M0,15 L0,45" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
    <!-- Microchip point in center -->
    <rect x="-3" y="-3" width="6" height="6" fill="#22d3ee"/>
  </g>
  <text x="140" y="75" font-size="45" class="text-main">ENERGY<tspan class="text-accent">TECH</tspan></text>
</svg>
